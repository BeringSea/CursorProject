server:
  port: 8082

spring:
  application:
    name: person-service
  datasource:
    url: jdbc:h2:mem:persondb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

cards-service:
  url: http://localhost:8081

logging:
  level:
    com.example.person: DEBUG
